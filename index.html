<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Tree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-brand" contenteditable="true" id="family-name" spellcheck="false">My Family</div>

      <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search family members..." />
        <div class="search-results" id="search-results"></div>
      </div>

      <div class="header-actions">
        <button class="btn btn-primary" id="btn-add-person">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          <span class="btn-label">Add Person</span>
        </button>
        <button class="btn" id="btn-import">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="btn-label">Import</span>
        </button>
        <button class="btn" id="btn-export">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <span class="btn-label">Export</span>
        </button>
        <button class="btn" id="btn-reset">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          <span class="btn-label">Reset</span>
        </button>
      </div>

      <div class="toolbar">
        <button class="btn-icon" id="btn-theme" title="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <div class="main-content">
      <div class="tree-container" id="tree-container">
        <div class="tree-controls">
          <button class="btn-icon" id="btn-fit" title="Fit to screen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
          <button class="btn-icon" id="btn-expand-all" title="Expand all">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
          <button class="btn-icon" id="btn-collapse-all" title="Collapse all">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>

      <div class="side-panel" id="side-panel"></div>
    </div>
  </div>

  <!-- Add Person Dialog -->
  <div class="dialog" id="add-person-dialog">
    <div class="dialog-overlay"></div>
    <div class="dialog-content">
      <h3>Add Family Member</h3>
      <form class="dialog-form" id="add-person-form">
        <label class="form-label">First Name
          <input type="text" name="firstName" class="input" required placeholder="Enter first name" />
        </label>
        <label class="form-label">Last Name
          <input type="text" name="lastName" class="input" placeholder="Enter last name" />
        </label>
        <label class="form-label">Gender
          <select name="gender" class="input">
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="O">Other</option>
          </select>
        </label>
        <label class="form-label">Date of Birth
          <input type="date" name="birthday" class="input" />
        </label>
        <div class="dialog-actions">
          <button type="button" class="btn" id="add-person-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Person</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
